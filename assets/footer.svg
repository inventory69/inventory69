<svg width="800" height="60" viewBox="0 0 800 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&amp;display=swap');
      
      .terminal-bg { fill: #1e1e2e; }
      .terminal-border { stroke: #11111b; }
      .terminal-text { 
        fill: #eff1f5; 
        font-family: 'JetBrains Mono', monospace; 
        font-size: 12px;
      }
      .terminal-prompt { fill: #78c2ad; font-weight: 600; }
      .terminal-muted { fill: #6c7086; }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 0.2; }
      }
      
      .cursor-block {
        animation: pulse 1.5s infinite;
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="terminal-bg terminal-border" width="800" height="60" rx="8" stroke-width="2"/>
  
  <!-- Top Separator -->
  <line x1="10" y1="10" x2="790" y2="10" stroke="#11111b" stroke-width="1"/>
  
  <!-- Bottom Prompt -->
  <text class="terminal-prompt" x="20" y="35" font-size="12">inventory@github</text>
  <text class="terminal-text" x="140" y="35" font-size="12">:~$</text>
  <text class="terminal-muted" x="175" y="35" font-size="12">echo "Thanks for visiting!" ✨</text>
  
  <!-- Blinking Cursor Block -->
  <rect class="terminal-prompt cursor-block" x="20" y="45" width="10" height="2" opacity="0.8"/>
</svg>
