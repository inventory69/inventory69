<svg width="800" height="80" viewBox="0 0 800 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: normal;
        font-weight: 400;
        src: url(data:font/woff2;base64,) format('woff2');
      }
      
      .terminal-bg { fill: #1e1e2e; }
      .terminal-border { stroke: #11111b; }
      .terminal-text { 
        fill: #eff1f5; 
        font-family: 'JetBrains Mono', 'Courier New', monospace; 
        font-size: 15px;
        font-weight: 400;
      }
      .terminal-prompt { 
        fill: #78c2ad; 
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-weight: 600; 
      }
      .terminal-muted { fill: #6c7086; }
      .traffic-close { fill: #f38ba8; }
      .traffic-minimize { fill: #f9e2af; }
      .traffic-maximize { fill: #a6e3a1; }
      
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      
      .cursor {
        animation: blink 1.5s infinite;
      }
    </style>
  </defs>
  
  <!-- Background with border -->
  <rect class="terminal-bg terminal-border" x="0" y="0" width="800" height="80" rx="8" stroke-width="2"/>
  
  <!-- Traffic Lights (macOS style) -->
  <circle class="traffic-close" cx="20" cy="25" r="6"/>
  <circle class="traffic-minimize" cx="40" cy="25" r="6"/>
  <circle class="traffic-maximize" cx="60" cy="25" r="6"/>
  
  <!-- Window Title -->
  <text class="terminal-text" x="400" y="30" text-anchor="middle">
    inventory@github:~
  </text>
  
  <!-- Window Controls -->
  <text class="terminal-muted" x="780" y="30" text-anchor="end" font-size="14">
    [_][□][×]
  </text>
  
  <!-- Separator Line -->
  <line x1="10" y1="45" x2="790" y2="45" stroke="#11111b" stroke-width="1"/>
  
  <!-- Prompt Line -->
  <text class="terminal-prompt" x="20" y="65" font-size="16">inventory@github</text>
  <text class="terminal-text" x="160" y="65" font-size="16">:~$</text>
  <text class="terminal-muted cursor" x="195" y="65" font-size="16">▋</text>
</svg>
