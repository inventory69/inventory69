name: Generate Snake
on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: inventory69
          outputs: |
            metrics/contribution-snake.svg
            metrics/contribution-snake-dark.svg?palette=github-dark
            metrics/contribution-snake-custom.svg?color_snake=#78c2ad&color_dots=#1e1e2e,#26283e,#375a7f,#584966,#78c2ad
      
      - name: Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Update contribution snake"
          file_pattern: metrics/*.svg
