name: Generate Snake
on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: inventory69
          outputs: |
            dist/contribution-snake.svg
            dist/contribution-snake-dark.svg?palette=github-dark
            dist/contribution-snake-custom.svg?color_snake=#78c2ad&color_dots=#1e1e2e,#26283e,#375a7f,#584966,#78c2ad
      
      - name: Copy snake files to metrics folder
        run: |
          mkdir -p metrics
          cp dist/*.svg metrics/
          ls -la metrics/
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics/*.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Update contribution snake" && git push)
